name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust Workspace
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes pkg-config libudev-dev

      - name: Install Rust toolchain
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
            . "$HOME/.cargo/env"
          fi

          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Capture Rust cache key
        id: rust-version
        run: echo "hash=$(rustc -Vv | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache Cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ steps.rust-version.outputs.hash }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'crates/**/Cargo.toml', 'crates/**/Cargo.lock', 'programs/**/Cargo.toml', 'programs/**/Cargo.lock', 'tests/Cargo.toml', 'tests/Cargo.lock', 'Anchor.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ steps.rust-version.outputs.hash }}-

      - name: Validate workspace
        run: cargo check --workspace --all-targets

      - name: Run Rust test suite
        run: cargo test --workspace --exclude integration-tests

  solana-integration:
    name: Solana Integration
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes pkg-config libudev-dev

      - name: Install Rust toolchain
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
            . "$HOME/.cargo/env"
          fi

          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Capture Rust cache key
        id: rust-version
        run: echo "hash=$(rustc -Vv | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache Cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ steps.rust-version.outputs.hash }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'crates/**/Cargo.toml', 'crates/**/Cargo.lock', 'programs/**/Cargo.toml', 'programs/**/Cargo.lock', 'tests/Cargo.toml', 'tests/Cargo.lock', 'Anchor.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ steps.rust-version.outputs.hash }}-

      # Anchor.toml already routes `anchor test` to this crate, so we can cover
      # the local Solana path here without pulling in Anchor CLI or external RPCs.
      - name: Run integration-tests crate
        run: cargo test -p integration-tests -- --nocapture

  security:
    name: Dependency Security
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
            . "$HOME/.cargo/env"
          fi

          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        run: |
          cargo generate-lockfile
          cargo audit
